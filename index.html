<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duoclique Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="public/duoclique.png" alt="Duoclique Games Logo" class="navbar-logo me-2">
                <span class="brand-text">Duoclique Games</span>
            </a>
            
            <div class="d-flex align-items-center shadow-sm">
                <div class="form-check form-switch me-3">
                    <input class="form-check-input" type="checkbox" id="themeSwitcher" checked>
                    <label class="form-check-label small" for="themeSwitcher">theme</label>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#games">Games</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-2 fw-bold">We make games.</h1>
            <p class="lead mb-4">hi</p>
        </div>
    </header>

    <section id="games" class="py-5 bg-body-tertiary">
        <div class="container">
            <h2 class="text-center mb-5">What we make</h2>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card h-100 card-thingamajig shadow-sm border-0">
                        <div class="card-body">
                            <h5 class="card-title fw-bold">Stealth Sector</h5>
                            <p class="card-text text-secondary">coming soon!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-body-secondary py-4 text-center border-top">
        <div class="container">
            <p class="mb-0 text-body-secondary">&copy; 2026 Duoclique Games. Website licensed under MIT. </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
